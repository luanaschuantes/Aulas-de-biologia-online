<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BioMentoria - Aulas</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

<nav>
    <nav>
    <a href="index.html">Início</a>
    <a href="clientes.html">Cadastro de Alunos</a>
    <a href="servicos.html">Cursos</a>
    <a href="agendamentos.html">Mensalidades</a>
    <a href="consulta_agendamentos.html">Contato</a>
    <a href="admin.html">Admin</a>
</nav>

<header class="banner">
    <h1>📚 Aulas de Biologia</h1>
    <p>Escolha o pacote e cadastre a aula com valor automático</p>
</header>

<div class="container">

    <!-- FORM -->
    <div class="card">
        <h2>➕ Nova Aula</h2>

        <form action="/salvar-servico" method="POST">

            <label>Descrição da Aula</label>
            <input type="text" name="descricao" placeholder="Ex: Genética Básica" required>

            <!-- PACOTE -->
            <label>Escolha o Pacote</label>
            <select id="pacote" onchange="atualizarValor()">
                <option value="20">3 meses - R$ 20</option>
                <option value="40">6 meses - R$ 40</option>
                <option value="60">1 ano - R$ 60</option>
            </select>

            <!-- VALOR AUTOMÁTICO -->
            <label>Valor (R$)</label>
            <input type="number" step="0.01" name="preco" id="valor" readonly>

            <label>Duração (horas)</label>
            <input type="number" name="tempo_estimado" placeholder="Ex: 2" required>

            <button class="btn" type="submit">Salvar Aula</button>
        </form>
    </div>

    <!-- LISTA -->
    <div class="card">
        <h2>📖 Aulas Cadastradas</h2>

        <table>
            <thead>
                <tr>
                    <th>Aula</th>
                    <th>Valor</th>
                    <th>Duração</th>
                </tr>
            </thead>

            <tbody id="lista-servicos"></tbody>
        </table>
    </div>

</div>

<footer>
    <p>&copy; 2026 BioMentoria - Todos os direitos reservados</p>
</footer>

<script>
// valor automático do pacote
function atualizarValor() {
    const valor = document.getElementById("pacote").value;
    document.getElementById("valor").value = valor;
}

// inicia valor padrão
atualizarValor();

// listar aulas
fetch('/listar-servicos')
.then(res => res.json())
.then(servicos => {

    const tabela = document.getElementById('lista-servicos');
    tabela.innerHTML = "";

    servicos.forEach(s => {

        tabela.innerHTML += `
            <tr>
                <td><strong>${s.descricao}</strong></td>
                <td>R$ ${Number(s.preco).toFixed(2)}</td>
                <td>${s.tempo_estimado}h</td>
            </tr>
        `;
    });
});
</script>

</body>
</html>
