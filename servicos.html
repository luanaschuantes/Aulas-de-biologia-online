<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilo.css">
    <title>BioMentoria - Aulas de Biologia</title>
</head>

<body>

<nav>
    <a href="index.html">Início</a>
    <a href="clientes.html">Cadastro de Alunos</a>
    <a href="servicos.html">Aulas</a>
    <a href="agendamentos.html">Mensalidades</a>
    <a href="consulta_agendamentos.html">Contato</a>
    <a href="admin.html">Admin</a>
</nav>

<header class="banner">
    <h1>Aulas de Biologia</h1>
    <p>Gerencie e cadastre aulas disponíveis</p>
</header>

<div class="container">

    <!-- FORM -->
    <div class="card">
        <h2>Nova Aula</h2>

        <form action="/salvar-servico" method="POST">

            <label>Descrição da Aula</label>
            <input type="text" name="descricao" required>

            <label>Valor (R$)</label>
            <input type="number" step="0.01" name="preco" required>

            <label>Duração (horas)</label>
            <input type="number" name="tempo_estimado" required>

            <button class="btn" type="submit">Salvar Aula</button>
        </form>
    </div>

    <!-- LISTA -->
    <div class="card">
        <h2>Aulas Disponíveis</h2>

        <table>
            <thead>
                <tr>
                    <th>Aula</th>
                    <th>Valor</th>
                    <th>Duração</th>
                </tr>
            </thead>

            <tbody id="lista-servicos"></tbody>
        </table>
    </div>

</div>

<footer>
    <p>&copy; 2026 BioMentoria - Todos os Direitos Reservados</p>
</footer>

<script>
fetch('/listar-servicos')
.then(res => res.json())
.then(servicos => {

    const tabela = document.getElementById('lista-servicos');
    tabela.innerHTML = "";

    servicos.forEach(s => {

        let preco = s.preco ? Number(s.preco).toFixed(2) : "0.00";

        tabela.innerHTML += `
            <tr>
                <td><strong>${s.descricao}</strong></td>
                <td>R$ ${preco}</td>
                <td>${s.tempo_estimado}h</td>
            </tr>
        `;
    });
})
.catch(err => console.log("Erro ao carregar aulas:", err));
</script>

</body>
</html>
