<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Admin - BioMentoria</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

<nav>
    <a href="index.html">Início</a>
</nav>

<header class="banner">
    <h1>Login Administrativo</h1>
    <p>Acesso restrito ao sistema</p>
</header>

<div class="container">

    <div class="card">

        <h2>Entrar como Admin</h2>

        <form action="/login-admin" method="POST">

            <label>Nome</label>
            <input type="text" name="nome" placeholder="Luana Schuantes" required>

            <label>Senha</label>
            <input type="password" name="senha" placeholder="********" required>

            <button class="btn" type="submit">
                Entrar
            </button>

        </form>

    </div>

</div>

<footer class="rodape">
    <p>&copy; 2026 BioMentoria</p>
</footer>

</body>
</html>
