<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - BioMentoria</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

<nav>
    <a href="index.html">Início</a>
    <a href="clientes.html">Alunos</a>
    <a href="servicos.html">Planos</a>
    <a href="agendamentos.html">Mensalidades</a>
    <a href="consulta_agendamentos.html">Contato</a>
    <a href="/logout">Sair</a>
</nav>

<header class="banner">
    <h1>Painel Administrativo</h1>
    <p>Controle de alunos cadastrados</p>
</header>

<div class="container">

    <div class="card">
        <h2>👨‍🎓 Lista de Alunos</h2>

        <button class="btn" onclick="carregarAlunos()">
            Atualizar lista
        </button>

        <br><br>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Telefone</th>
                </tr>
            </thead>

            <tbody id="tabela-alunos"></tbody>
        </table>
    </div>

</div>

<footer class="rodape">
    <p>&copy; 2026 BioMentoria - Admin</p>
</footer>

<script>
function carregarAlunos() {

    fetch('/admin/alunos')
    .then(res => {

        if (!res.ok) {
            window.location.href = "/login.html";
        }

        return res.json();
    })
    .then(data => {

        const tabela = document.getElementById('tabela-alunos');
        tabela.innerHTML = "";

        data.forEach(aluno => {
            tabela.innerHTML += `
                <tr>
                    <td>${aluno.nome}</td>
                    <td>${aluno.cpf}</td>
                    <td>${aluno.telefone}</td>
                </tr>
            `;
        });

    })
    .catch(err => {
        console.log(err);
        alert("Erro ao carregar alunos");
    });
}

window.onload = carregarAlunos;
</script>

</body>
</html>
