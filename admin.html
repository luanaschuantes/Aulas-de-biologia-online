<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin - BioMentoria</title>
<link rel="stylesheet" href="estilo.css">
</head>

<body>

<nav>
    <a href="index.html">Início</a>
    <a href="clientes.html">Cadastro de Alunos</a>
    <a href="servicos.html">Planos</a>
    <a href="agendamentos.html">Mensalidades</a>
    <a href="consulta_agendamentos.html">Contato</a>
    <a href="login.html">Sair</a>
</nav>

<header class="banner">
    <h1>Painel da Luana Schuantes</h1>
    <p>Alunos cadastrados no sistema</p>
</header>

<div class="container">

<div class="card">
    <h2>👨‍🎓 Lista de Alunos</h2>

    <button class="btn" onclick="carregar()">Atualizar Lista</button>

    <br><br>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>CPF</th>
                <th>Telefone</th>
            </tr>
        </thead>

        <tbody id="lista"></tbody>
    </table>
</div>

</div>

<script>

function carregar() {

    fetch('/listar-clientes')
    .then(res => {
        if (!res.ok) throw new Error("Sem acesso");
        return res.json();
    })
    .then(clientes => {

        const tabela = document.getElementById('lista');
        tabela.innerHTML = '';

        clientes.forEach(c => {
            tabela.innerHTML += `
                <tr>
                    <td><strong>${c.nome}</strong></td>
                    <td>${c.cpf}</td>
                    <td>${c.telefone}</td>
                </tr>
            `;
        });

    })
    .catch(() => {
        alert("Você não tem acesso. Faça login como admin.");
        window.location.href = "/login.html";
    });

}

window.onload = carregar;

</script>

</body>
</html>
