<div class="container">
    <div class="card">
        <h2>Admin - Alunos</h2>
        <button onclick="carregar()">Carregar alunos</button>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                </tr>
            </thead>

            <tbody id="lista"></tbody>
        </table>
    </div>
</div>

<script>
function carregar() {
    fetch('/admin/alunos')
    .then(r => r.json())
    .then(data => {
        const t = document.getElementById('lista');
        t.innerHTML = "";

        data.forEach(u => {
            t.innerHTML += `
                <tr>
                    <td>${u.nome}</td>
                    <td>${u.email}</td>
                </tr>
            `;
        });
    });
}
</script>
