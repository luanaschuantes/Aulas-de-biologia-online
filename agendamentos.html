<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilo.css">
    <title>BioMentoria - Mensalidades</title>
</head>

<body>

<nav>
    <a href="index.html">Início</a>
    <a href="clientes.html">Cadastro de Alunos</a>
    <a href="servicos.html">Planos</a>
    <a href="agendamentos.html">Mensalidades</a>
    <a href="consulta_agendamentos.html">Contato</a>
    <a href="admin.html">Admin</a>
</nav>

<header class="banner">
    <h1>Gestão de Mensalidades</h1>
    <p>Organize e registre os planos dos alunos</p>
</header>

<div class="container">

    <div class="card">

        <h2>Nova Mensalidade</h2>

        <label>Aluno / Responsável:</label>
        <select id="selCliente">
            <option value="">Selecione o aluno...</option>
        </select>

        <label>Data de vencimento:</label>
        <input type="datetime-local" id="data_agendamento">

        <label>Turma / Plano:</label>
        <input type="text" id="responsavel">

        <hr>

        <h3>Plano / Aula</h3>

        <label>Selecione:</label>
        <select id="selServico">
            <option value="">Selecione...</option>
        </select>

        <label>Valor</label>
        <input type="number" id="txtPreco" readonly>

        <label>Carga Horária</label>
        <input type="number" id="txtTempo" readonly>

        <button class="btn" type="button">
            Adicionar à Mensalidade
        </button>

    </div>

    <div class="card">

        <h2>Itens da Mensalidade</h2>

        <table>
            <thead>
                <tr>
                    <th>Plano / Aula</th>
                    <th>Carga Horária</th>
                    <th>Valor</th>
                </tr>
            </thead>

            <tbody id="lista-servicos-agendados"></tbody>
        </table>

        <div style="text-align:right; margin-top:15px;">
            <h3>Total: R$ 0,00</h3>
            <h4>Carga Horária: 0h</h4>
        </div>

        <button class="btn">
            Confirmar Mensalidade
        </button>

    </div>

</div>

<footer class="rodape">
    <p>&copy; 2026 BioMentoria - Plataforma de Biologia</p>
</footer>

<script>
window.onload = function () {

    fetch('/listar-clientes')
    .then(r => r.json())
    .then(data => {
        let sel = document.getElementById('selCliente');
        data.forEach(c => {
            sel.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
        });
    });

    fetch('/listar-servicos')
    .then(r => r.json())
    .then(data => {
        let sel = document.getElementById('selServico');
        data.forEach(s => {
            sel.innerHTML += `<option value="${s.id}">${s.descricao}</option>`;
        });
    });

};
</script>

</body>
</html>
