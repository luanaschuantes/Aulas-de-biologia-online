<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilo.css">
    <title>BioMentoria - Contato</title>
</head>

<body>

<nav>
    <a href="index.html">Início</a>
    <a href="clientes.html">Matrícula</a>
    <a href="servicos.html">Planos</a>
    <a href="agendamentos.html">Conteúdos</a>
    <a href="consulta_agendamentos.html">Contato</a>
    <a href="admin.html">Admin</a>
</nav>

<header class="banner">
    <h1>Fale Conosco</h1>
    <p>Dúvidas e suporte</p>
</header>

<div class="container">

    <!-- CONTATO -->
    <div class="card">

        <h2>WhatsApp</h2>

        <p>Atendimento rápido:</p>

        <a class="btn" href="https://wa.me/5546999713828" target="_blank">
            📲 Falar no WhatsApp
        </a>

    </div>

    <!-- LISTA -->
    <div class="card">

        <h2>Agendamentos</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Data</th>
                    <th>Cliente</th>
                    <th>Responsável</th>
                    <th>Total</th>
                    <th>Ação</th>
                </tr>
            </thead>

            <tbody id="lista-agendamentos-consulta"></tbody>
        </table>

    </div>

    <!-- DETALHES -->
    <div id="card-detalhes" class="card" style="display:none;">

        <h2>Detalhes #<span id="num-agendamento"></span></h2>

        <table>
            <thead>
                <tr>
                    <th>Serviço</th>
                    <th>Horas</th>
                    <th>Valor</th>
                </tr>
            </thead>

            <tbody id="lista-servicos-detalhe"></tbody>
        </table>

    </div>

</div>

<footer class="rodape">
    <p>&copy; 2026 BioMentoria - Todos os Direitos Reservados</p>
</footer>

<script>
window.onload = function () {

    fetch('/listar-agendamentos')
    .then(r => r.json())
    .then(data => {

        const tabela = document.getElementById('lista-agendamentos-consulta');
        tabela.innerHTML = "";

        data.forEach(a => {

            let total = a.total ? Number(a.total).toFixed(2) : "0.00";

            let dataFormatada = new Date(a.data).toLocaleString('pt-BR');

            tabela.innerHTML += `
                <tr>
                    <td>${a.id}</td>
                    <td>${dataFormatada}</td>
                    <td>${a.nome_cliente}</td>
                    <td>${a.responsavel}</td>
                    <td>R$ ${total}</td>
                    <td>
                        <button class="btn" onclick="verDetalhes(${a.id})">
                            Ver
                        </button>
                    </td>
                </tr>
            `;
        });
    });
};

function verDetalhes(id) {

    fetch(`/detalhes-agendamento/${id}`)
    .then(r => r.json())
    .then(data => {

        document.getElementById('card-detalhes').style.display = 'block';
        document.getElementById('num-agendamento').innerText = id;

        const tabela = document.getElementById('lista-servicos-detalhe');
        tabela.innerHTML = "";

        data.forEach(s => {

            tabela.innerHTML += `
                <tr>
                    <td>${s.descricao}</td>
                    <td>${s.tempo_estimado}h</td>
                    <td>R$ ${Number(s.preco_cobrado).toFixed(2)}</td>
                </tr>
            `;
        });

    });
}
</script>

</body>
</html>
