<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilo.css">
    <title>BioMentoria - Cadastro de Alunos</title>
</head>

<body>

<nav>
    <a href="index.html">Início</a>
    <a href="clientes.html">Cadastro de Alunos</a>
    <a href="servicos.html">Cursos</a>
    <a href="agendamentos.html">Mensalidades</a>
    <a href="consulta_agendamentos.html">Contato</a>
    <a href="admin.html">Admin</a>
</nav>

<header class="banner">
    <h1>Cadastro de Alunos</h1>
    <p>Gerencie os estudantes da BioMentoria</p>
</header>

<div class="container">

    <!-- FORM -->
    <div class="card">
        <h2>➕ Novo Aluno</h2>

        <form action="/salvar-cliente" method="POST">

            <label>Nome</label>
            <input type="text" name="nome" required>

            <label>CPF</label>
            <input type="text" name="cpf" required>

            <label>Telefone</label>
            <input type="tel" name="telefone" required>

            <button class="btn" type="submit">Salvar</button>
        </form>
    </div>

    <!-- LISTA -->
    <div class="card">
        <h2>👨‍🎓 Alunos Cadastrados</h2>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Telefone</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="lista-clientes"></tbody>
        </table>
    </div>

</div>

<footer class="rodape">
    <p>&copy; 2026 BioMentoria - Todos os Direitos Reservados</p>
</footer>

<script>
let alunos = [];

function carregar() {
    fetch('/listar-clientes')
    .then(res => res.json())
    .then(data => {
        alunos = data;
        renderizar();
    });
}

function renderizar() {
    const tabela = document.getElementById('lista-clientes');
    tabela.innerHTML = "";

    alunos.forEach((a) => {
        tabela.innerHTML += `
            <tr>
                <td><strong>${a.nome}</strong></td>
                <td>${a.cpf}</td>
                <td>${a.telefone}</td>
                <td>
                    <button class="btn" onclick="alert('Editar precisa backend')">✏ Editar</button>
                    <button class="btn" onclick="alert('Excluir precisa backend')">🗑 Excluir</button>
                </td>
            </tr>
        `;
    });
}

window.onload = carregar;
</script>

</body>
</html>
