<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilo.css">
    <title>BioMentoria - Cadastro de Alunos</title>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="clientes.html">Alunos</a>
    <a href="servicos.html">Cursos</a>
    <a href="agendamentos.html">Mentorias</a>
    <a href="consulta_agendamentos.html">Contato</a>
</nav>

<header class="banner">
    <h1>Cadastro de Alunos</h1>
    <p>Gerencie os estudantes da BioMentoria</p>
</header>

<div class="container">

    <!-- FORMULÁRIO -->
    <div class="card">
        <h2>➕ Novo Aluno</h2>

        <form action="/salvar-cliente" method="POST">

            <label>Nome</label>
            <input type="text" name="nome" required>

            <label>CPF</label>
            <input type="text" name="cpf" required>

            <label>Telefone</label>
            <input type="tel" name="telefone" required>

            <button type="submit">Salvar</button>
        </form>
    </div>

    <!-- LISTA -->
    <div class="card">
        <h2>👨‍🎓 Alunos Cadastrados</h2>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Telefone</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="lista-clientes"></tbody>
        </table>
    </div>

</div>

<script>
let alunos = [];

fetch('/listar-clientes')
    .then(res => res.json())
    .then(data => {
        alunos = data;
        renderizar();
    });

function renderizar() {
    const tabela = document.getElementById('lista-clientes');
    tabela.innerHTML = "";

    alunos.forEach((a, index) => {
        tabela.innerHTML += `
            <tr>
                <td><strong>${a.nome}</strong></td>
                <td>${a.cpf}</td>
                <td>${a.telefone}</td>
                <td>
                    <button onclick="editar(${index})">✏ Editar</button>
                    <button onclick="deletar(${index})">🗑 Excluir</button>
                </td>
            </tr>
        `;
    });
}

// EDITAR (front simples - depois liga no backend)
function editar(i) {
    const aluno = alunos[i];

    const novoNome = prompt("Editar nome:", aluno.nome);
    const novoCpf = prompt("Editar CPF:", aluno.cpf);
    const novoTel = prompt("Editar telefone:", aluno.telefone);

    if (novoNome) alunos[i].nome = novoNome;
    if (novoCpf) alunos[i].cpf = novoCpf;
    if (novoTel) alunos[i].telefone = novoTel;

    renderizar();
}

// EXCLUIR (front simples - depois liga no backend)
function deletar(i) {
    if (confirm("Tem certeza que deseja excluir este aluno?")) {
        alunos.splice(i, 1);
        renderizar();
    }
}
</script>

</body>

<footer class="rodape">
    <p>&copy; 2026 BioMentoria - Sistema de Alunos</p>
</footer>

</html>
